<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350f"/> <!-- amber yellow shadow -->
      <stop offset="60%" stop-color="#1e1b4b"/> <!-- deep blue -->
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="bloodGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>
  
  <!-- Diagonal Slash Cuts background glow (Red lasers) -->
  <path d="M70 40 L90 230 M130 30 L150 240 M190 40 L210 230" stroke="#ef4444" stroke-width="12" opacity="0.25" filter="url(#bloodGlow)"/>
  <path d="M75 40 L95 230 M135 30 L155 240 M195 40 L215 230" stroke="#f43f5e" stroke-width="4" opacity="0.4" filter="url(#bloodGlow)"/>

  <!-- Adamantium Claws -->
  <!-- Claw 1 -->
  <path d="M70 40 L72 38 L94 228 L88 232 Z" fill="url(#clawGrad)" stroke="#475569" stroke-width="1.5"/>
  <line x1="81" y1="39" x2="91" y2="230" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>

  <!-- Claw 2 (Center) -->
  <path d="M130 30 L132 28 L154 238 L148 242 Z" fill="url(#clawGrad)" stroke="#475569" stroke-width="1.5"/>
  <line x1="141" y1="29" x2="151" y2="240" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>

  <!-- Claw 3 -->
  <path d="M190 40 L192 38 L214 228 L208 232 Z" fill="url(#clawGrad)" stroke="#475569" stroke-width="1.5"/>
  <line x1="201" y1="39" x2="211" y2="230" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>

  <!-- Claw Sparks / Blood Splatter droplets -->
  <circle cx="94" cy="220" r="3" fill="#ef4444" filter="url(#bloodGlow)"/>
  <circle cx="154" cy="230" r="4" fill="#ef4444" filter="url(#bloodGlow)"/>
  <circle cx="214" cy="220" r="3" fill="#ef4444" filter="url(#bloodGlow)"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="65" height="20" rx="3" fill="#ef4444"/>
  <text x="47.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="1">MARVEL</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #03</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#eab308" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">WOLVERINE</text>
  <text x="150" y="272" fill="#ef4444" font-family="'Trebuchet MS', sans-serif" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="2">WEAPON X</text>
</svg>
