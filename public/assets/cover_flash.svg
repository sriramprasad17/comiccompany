<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#dc2626"/> <!-- Flash Red -->
      <stop offset="100%" stop-color="#450a0a"/> <!-- deep red -->
    </radialGradient>
    <filter id="speedGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>
  
  <!-- Speed Force lightning sparks -->
  <path d="M40 80 L60 70 L50 90 M230 200 L250 190 L240 210 M30 220 L60 210 L45 230 M240 70 L260 60 L250 80" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" filter="url(#speedGlow)"/>

  <!-- Speed Ring (White circle with Gold border) -->
  <g filter="drop-shadow(0 4px 8px rgba(0,0,0,0.4))">
    <circle cx="150" cy="135" r="50" fill="#ffffff" stroke="#f59e0b" stroke-width="5"/>
    <circle cx="150" cy="135" r="44" stroke="#d97706" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Golden Lightning Bolt -->
  <polygon points="175,70 120,135 155,135 125,200 185,120 150,120" fill="#fbbf24" stroke="#d97706" stroke-width="2" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.3))"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="45" height="20" rx="3" fill="#2563eb"/>
  <text x="37.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="12" font-weight="900" text-anchor="middle">DC</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #03</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#fbbf24" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">THE FLASH</text>
  <text x="150" y="272" fill="#ef4444" font-family="'Trebuchet MS', sans-serif" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="2">FLASHPOINT</text>
</svg>
