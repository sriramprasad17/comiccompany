<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/> <!-- bright sky blue -->
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#skyGrad)"/>
  
  <!-- Sunburst lines -->
  <path d="M150 135 L50 35 M150 135 L250 35 M150 135 L150 35 M150 135 L50 135 M150 135 L250 135 M150 135 L50 235 M150 135 L250 235 M150 135 L150 235" stroke="#fef08a" stroke-width="2" opacity="0.3"/>

  <!-- Golden Andes Mountains in backdrop -->
  <polygon points="20,180 80,120 140,180" fill="#fbbf24" opacity="0.6"/>
  <polygon points="100,180 180,100 260,180" fill="#d97706" opacity="0.7"/>

  <!-- Donald Duck Silhouette (Sailor Hat + Bow Tie) -->
  <g filter="drop-shadow(0 4px 8px rgba(0,0,0,0.25))">
    <!-- White Duck Head shape -->
    <circle cx="150" cy="130" r="45" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Yellow beak curve outline -->
    <path d="M110 135 Q100 138 95 142 Q110 160 150 160 C175 160 190 150 195 142" fill="#ea580c" stroke="#b45309" stroke-width="1.5"/>

    <!-- Sailor Hat -->
    <!-- Blue crown -->
    <path d="M125 90 Q150 78 175 90 L168 100 H132 Z" fill="#0284c7" stroke="#0369a1" stroke-width="2"/>
    <!-- Black ribbon -->
    <path d="M120 100 H180 V105 H120 Z" fill="#0f172a"/>
    <!-- Sailor hat trailing ribbon -->
    <path d="M172 103 Q190 110 188 120" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" fill="none"/>

    <!-- Red Sailor Bow Tie -->
    <polygon points="150,185 130,172 130,198" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <polygon points="150,185 170,172 170,198" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <circle cx="150" cy="185" r="7" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  </g>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="55" height="20" rx="3" fill="#ca8a04"/>
  <text x="42.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="0.5">DISNEY</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#0f172a" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #02</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#0f172a" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="drop-shadow(0 1px 2px rgba(255,255,255,0.8))">DONALD DUCK</text>
  <text x="150" y="272" fill="#ea580c" font-family="'Trebuchet MS', sans-serif" font-size="8" font-weight="bold" text-anchor="middle" letter-spacing="1">TREASURE OF THE ANDES</text>
</svg>
