<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="60%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>
  
  <!-- Storm Clouds / Lighting Accents -->
  <circle cx="150" cy="140" r="110" fill="#22d3ee" fill-opacity="0.03" filter="url(#glow)"/>
  
  <!-- Lightning Bolts -->
  <path d="M50 30 L90 90 L70 120 M250 30 L200 90 L220 130" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <path d="M80 150 L110 130 L100 150 M210 160 L180 150 L190 170" stroke="#e2f8ff" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Hammer Handle -->
  <rect x="145" y="140" width="10" height="70" rx="3" fill="#78350f" stroke="#451a03" stroke-width="1.5"/>
  <!-- Handle Straps -->
  <line x1="145" y1="155" x2="155" y2="155" stroke="#451a03" stroke-width="2"/>
  <line x1="145" y1="170" x2="155" y2="170" stroke="#451a03" stroke-width="2"/>
  <line x1="145" y1="185" x2="155" y2="185" stroke="#451a03" stroke-width="2"/>
  <path d="M145 210 Q150 220 155 210" stroke="#78350f" stroke-width="2" fill="none"/>

  <!-- Hammer Head -->
  <path d="M110 90 H190 L185 140 H115 Z" fill="url(#hammerGrad)" stroke="#475569" stroke-width="2"/>
  <!-- Hammer Top Cap -->
  <path d="M125 90 L130 82 H170 L175 90 Z" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
  <!-- Hammer Central Engravings -->
  <path d="M150 95 V135 M130 115 H170" stroke="#475569" stroke-width="1.5" opacity="0.4"/>
  <circle cx="150" cy="115" r="8" stroke="#22d3ee" stroke-width="1.5" fill="none" filter="url(#glow)"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="65" height="20" rx="3" fill="#ef4444"/>
  <text x="47.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="1">MARVEL</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #05</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#22d3ee" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="1" filter="url(#glow) (0 2px 4px rgba(0,0,0,0.8))">THOR</text>
  <text x="150" y="272" fill="#e2f8ff" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="3">GOD OF THUNDER</text>
</svg>
