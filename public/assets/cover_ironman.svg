<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#450a0a"/> <!-- deep hot rod red -->
      <stop offset="100%" stop-color="#0f0505"/>
    </linearGradient>
    <radialGradient id="reactorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0891b2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <filter id="laserGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>
  
  <!-- Tech Grid Background -->
  <path d="M0 60 H300 M0 240 H300 M60 0 V300 M240 0 V300" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
  <circle cx="150" cy="135" r="95" stroke="rgba(239,68,68,0.15)" stroke-width="1.5" stroke-dasharray="4 8"/>

  <!-- Core Repulsor Glow -->
  <circle cx="150" cy="135" r="80" fill="url(#reactorGlow)"/>

  <!-- Outer Reactor Ring -->
  <circle cx="150" cy="135" r="55" stroke="#475569" stroke-width="6" fill="none"/>
  
  <!-- Copper Reactor Coils (10 segments) -->
  <g stroke="#f59e0b" stroke-width="6" stroke-linecap="round">
    <line x1="150" y1="72" x2="150" y2="78"/>
    <line x1="184" y1="83" x2="179" y2="88"/>
    <line x1="202" y1="113" x2="196" y2="116"/>
    <line x1="199" y1="151" x2="193" y2="149"/>
    <line x1="176" y1="181" x2="171" y2="177"/>
    <line x1="141" y1="191" x2="144" y2="185"/>
    <line x1="108" y1="174" x2="113" y2="170"/>
    <line x1="97" y1="140" x2="103" y2="142"/>
    <line x1="106" y1="103" x2="112" y2="106"/>
    <line x1="129" y1="79" x2="132" y2="85"/>
  </g>

  <!-- Inner Repulsor Ring -->
  <circle cx="150" cy="135" r="32" stroke="#22d3ee" stroke-width="3" fill="none" filter="url(#laserGlow)"/>

  <!-- Glowing Central repulsor Triangle -->
  <g filter="url(#laserGlow)">
    <polygon points="150,110 172,148 128,148" fill="#ffffff" stroke="#e0f7fa" stroke-width="2"/>
  </g>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="65" height="20" rx="3" fill="#ef4444"/>
  <text x="47.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="1">MARVEL</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#f59e0b" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #02</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#f59e0b" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">IRON MAN</text>
  <text x="150" y="272" fill="#ef4444" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">ARMOR WARS</text>
</svg>
