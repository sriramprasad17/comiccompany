<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cavernGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#451a03"/> <!-- dark earthy brown -->
      <stop offset="55%" stop-color="#1c1917"/> <!-- stone grey -->
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <radialGradient id="amuletGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0"/>
    </radialGradient>
    <filter id="emeraldFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#cavernGrad)"/>
  
  <!-- Cavern Brick / Crack Lines -->
  <path d="M40 50 Q100 30 160 50 T280 40 M20 220 H280 M100 50 V220 M200 40 V220" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>

  <!-- Pedestal -->
  <path d="M100 170 L110 230 H190 L200 170 Z" fill="#292524" stroke="#1c1917" stroke-width="2"/>
  <ellipse cx="150" cy="170" rx="50" ry="12" fill="#44403c" stroke="#1c1917"/>

  <!-- Amulet Glow -->
  <ellipse cx="150" cy="140" rx="60" ry="60" fill="url(#amuletGlow)"/>

  <!-- Jade Amulet (Triangular/Key Shape) -->
  <g filter="url(#emeraldFilter)">
    <!-- Outer Ring -->
    <circle cx="150" cy="140" r="22" stroke="#34d399" stroke-width="4.5" fill="none"/>
    <!-- Triangular center blade -->
    <polygon points="150,123 162,148 138,148" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
    <circle cx="150" cy="141" r="5" fill="#a7f3d0"/>
  </g>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="80" height="20" rx="3" fill="#15803d"/>
  <text x="55" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="0.5">ADVENTURE</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #02</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#f8fafc" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="1" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">TOMB RAIDER</text>
  <text x="150" y="272" fill="#34d399" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">LEGEND OF THE AMULET</text>
</svg>
