<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/> <!-- deep rust red -->
      <stop offset="40%" stop-color="#ea580c"/> <!-- orange -->
      <stop offset="85%" stop-color="#fbbf24"/> <!-- yellow -->
      <stop offset="100%" stop-color="#fef08a"/> <!-- light yellow -->
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background Sky -->
  <rect width="300" height="300" fill="url(#skyGrad)"/>
  
  <!-- Giant Glowing Sun -->
  <circle cx="150" cy="150" r="70" fill="url(#sunGrad)"/>

  <!-- Distant Mountains / Acacia Silhouette -->
  <path d="M0 210 Q40 190 90 200 T180 195 T300 205 V220 H0 Z" fill="#291305" opacity="0.6"/>
  <!-- Acacia Tree -->
  <path d="M260 200 L263 170 Q250 160 230 165 M263 170 Q280 155 295 160 M262 178 L250 178" stroke="#1c0a00" stroke-width="3" fill="none"/>
  <ellipse cx="235" cy="162" rx="15" ry="4" fill="#1c0a00"/>
  <ellipse cx="285" cy="158" rx="18" ry="5" fill="#1c0a00"/>
  <ellipse cx="255" cy="168" rx="12" ry="4" fill="#1c0a00"/>

  <!-- Pride Rock Silhouette -->
  <path d="M0 220 L70 165 L160 165 L180 220 Z" fill="#1c0a00"/>
  <path d="M0 220 H300 V300 H0 Z" fill="#0f0500"/>

  <!-- Lion Silhouette on Pride Rock -->
  <!-- coordinates centered around x=115, y=145 -->
  <!-- tail, body, head, mane, legs -->
  <path d="M125 165 L124 158 Q125 152 120 152 L115 152 Q110 148 111 143 Q114 140 116 142 L118 141 Q116 137 113 138 L111 139 Q108 141 107 146 Q108 152 104 155 L104 165 H108 L108 160 L114 160 L114 165 H119 L119 159 H122 L121 165 Z" fill="#0f0500"/>
  <!-- lion tail curve -->
  <path d="M104 155 Q98 152 97 160 Q96 164 94 162" stroke="#0f0500" stroke-width="1.5" fill="none"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="55" height="20" rx="3" fill="#ca8a04"/>
  <text x="42.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="0.5">DISNEY</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#1c0a00" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #04</text>

  <!-- Title Text -->
  <text x="150" y="252" fill="#fef08a" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="1" filter="drop-shadow(0 2px 3px #1c0a00)">THE LION KING</text>
  <text x="150" y="272" fill="#fbbf24" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">PRIDE LANDS DESTINY</text>
</svg>
