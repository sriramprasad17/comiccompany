<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="noirGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/> <!-- dark slate -->
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#030712"/> <!-- near black -->
    </linearGradient>
    <linearGradient id="lightBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#noirGrad)"/>
  
  <!-- City Skyline Silhouette in background -->
  <path d="M0 160 H30 V110 H60 V130 H110 V90 H140 V150 H180 V120 H210 V140 H250 V110 H280 V160 H300 V180 H0 Z" fill="#030712" opacity="0.4"/>
  <rect x="0" y="180" width="300" height="120" fill="#030712"/>

  <!-- Street Lamp Light Beam -->
  <polygon points="150,40 100,180 200,180" fill="url(#lightBeam)"/>
  <circle cx="150" cy="40" r="10" fill="#fef08a" filter="drop-shadow(0 0 8px #fef08a)"/>

  <!-- Blood Red Footprint Clue -->
  <!-- main foot shape -->
  <ellipse cx="145" cy="155" rx="10" ry="16" fill="#ef4444" transform="rotate(-15, 145, 155)"/>
  <!-- heel -->
  <circle cx="137" cy="172" r="6" fill="#ef4444"/>
  <!-- toes -->
  <circle cx="136" cy="138" r="3.5" fill="#ef4444"/>
  <circle cx="144" cy="136" r="3.2" fill="#ef4444"/>
  <circle cx="152" cy="137" r="2.8" fill="#ef4444"/>
  <circle cx="159" cy="140" r="2.5" fill="#ef4444"/>
  <circle cx="165" cy="144" r="2.2" fill="#ef4444"/>
  
  <!-- Splatter droplets -->
  <circle cx="175" cy="165" r="2.5" fill="#ef4444"/>
  <circle cx="120" cy="160" r="1.5" fill="#ef4444"/>

  <!-- Rain Lines -->
  <line x1="40" y1="20" x2="30" y2="70" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="120" y1="30" x2="110" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="220" y1="20" x2="210" y2="70" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="80" y1="120" x2="70" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="260" y1="110" x2="250" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="85" height="20" rx="3" fill="#eab308"/>
  <text x="57.5" y="29" fill="#000000" font-family="'Impact', 'Arial Black', sans-serif" font-size="10" font-weight="900" text-anchor="middle" letter-spacing="0.5">CRIME SCENE</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#ef4444" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #01</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#f8fafc" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="1" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">DETECTIVE NOIR</text>
  <text x="150" y="272" fill="#ef4444" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">THE CRIMSON CLUE</text>
</svg>
