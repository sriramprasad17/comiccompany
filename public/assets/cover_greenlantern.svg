<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="1"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <filter id="emeraldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#spaceGrad)"/>
  
  <!-- Construct Grid -->
  <path d="M150 0 L150 300 M0 135 L300 135 M50 0 L150 135 L250 0 M50 300 L150 135 L250 300" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>

  <!-- Radial Glow behind emblem -->
  <circle cx="150" cy="135" r="90" fill="url(#ringGlow)"/>

  <!-- Green Lantern Symbol -->
  <g filter="url(#emeraldGlow)">
    <!-- Outer Ring circle -->
    <circle cx="150" cy="135" r="42" stroke="#34d399" stroke-width="9" fill="none"/>
    <!-- Top and Bottom bar caps -->
    <line x1="108" y1="90" x2="192" y2="90" stroke="#34d399" stroke-width="9" stroke-linecap="round"/>
    <line x1="108" y1="180" x2="192" y2="180" stroke="#34d399" stroke-width="9" stroke-linecap="round"/>
    <!-- Inner Core Bulb -->
    <circle cx="150" cy="135" r="16" fill="#a7f3d0"/>
  </g>

  <!-- Starburst Particles -->
  <circle cx="90" cy="80" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="210" cy="70" r="1.5" fill="#34d399" opacity="0.8" filter="url(#emeraldGlow)"/>
  <circle cx="80" cy="180" r="2" fill="#34d399" opacity="0.5" filter="url(#emeraldGlow)"/>
  <circle cx="220" cy="190" r="1" fill="#fff" opacity="0.7"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="45" height="20" rx="3" fill="#2563eb"/>
  <text x="37.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="12" font-weight="900" text-anchor="middle">DC</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #05</text>

  <!-- Title Text -->
  <text x="150" y="248" fill="#34d399" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="url(#emeraldGlow) (0 2px 4px rgba(0,0,0,0.8))">GREEN LANTERN</text>
  <text x="150" y="270" fill="#a7f3d0" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">EMERALD TWILIGHT</text>
</svg>
