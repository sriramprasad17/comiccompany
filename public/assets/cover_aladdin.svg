<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#581c87"/> <!-- deep purple -->
      <stop offset="60%" stop-color="#1e1b4b"/> <!-- indigo -->
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#854d0e"/>
    </linearGradient>
    <filter id="genieSmoke" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#skyGrad)"/>
  
  <!-- Crescent Moon and Stars -->
  <path d="M260 40 A20 20 0 1 0 240 70 A15 15 0 1 1 260 40 Z" fill="#fef08a" opacity="0.8"/>
  <circle cx="90" cy="50" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="160" cy="40" r="1" fill="#fff" opacity="0.5"/>

  <!-- Genie Purple/Blue Smoke trail from lamp -->
  <path d="M90 130 C70 90 100 70 120 80 Q150 90 170 60 T220 50" stroke="#a855f7" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5" filter="url(#genieSmoke)"/>
  <path d="M92 131 C75 95 102 75 122 83 Q148 93 168 65 T215 55" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4" filter="url(#genieSmoke)"/>

  <!-- Magic Lamp -->
  <g filter="drop-shadow(0 4px 10px rgba(0,0,0,0.5))">
    <!-- Lamp body & Base -->
    <path d="M120 160 H180 L185 145 H115 Z" fill="url(#goldGrad)" stroke="#854d0e" stroke-width="1.5"/>
    <ellipse cx="150" cy="140" rx="35" ry="20" fill="url(#goldGrad)" stroke="#854d0e" stroke-width="1.5"/>
    
    <!-- Lamp spout (long curves to the left) -->
    <path d="M120 135 C100 135 85 125 80 128 C75 130 82 145 118 145 Z" fill="url(#goldGrad)" stroke="#854d0e" stroke-width="1.5"/>
    
    <!-- Lamp handle (curled ring on the right) -->
    <path d="M180 135 Q205 130 200 150 Q195 165 178 152" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>

    <!-- Lamp lid & handle cap -->
    <path d="M142 122 L150 115 L158 122 Z" fill="url(#goldGrad)" stroke="#854d0e" stroke-width="1.5"/>
    <circle cx="150" cy="114" r="3" fill="#fef08a"/>
  </g>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="55" height="20" rx="3" fill="#ca8a04"/>
  <text x="42.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="0.5">DISNEY</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #03</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="url(#goldGrad)" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">ALADDIN</text>
  <text x="150" y="272" fill="#c084fc" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">THE MAGIC LAMP</text>
</svg>
