<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#090514"/>
    </linearGradient>
    <radialGradient id="shieldShine" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>
  
  <!-- Comic Grid Accents -->
  <path d="M0 50 H300 M0 250 H300" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  
  <!-- Shield Outer Red Ring -->
  <circle cx="150" cy="140" r="80" fill="#ef4444" stroke="#7f1d1d" stroke-width="2"/>
  
  <!-- Shield White Ring -->
  <circle cx="150" cy="140" r="62" fill="#f8fafc"/>
  
  <!-- Shield Inner Red Ring -->
  <circle cx="150" cy="140" r="46" fill="#ef4444"/>
  
  <!-- Shield Blue Center -->
  <circle cx="150" cy="140" r="30" fill="#2563eb" stroke="#1d4ed8" stroke-width="1"/>
  
  <!-- White Star -->
  <polygon points="150,116 157,131 173,131 160,141 165,157 150,147 135,157 140,141 127,131 143,131" fill="#ffffff" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.3))"/>
  
  <!-- Shading Overlay on Shield -->
  <circle cx="150" cy="140" r="80" fill="url(#shieldShine)" style="mix-blend-mode: overlay;"/>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="65" height="20" rx="3" fill="#ef4444"/>
  <text x="47.5" y="29" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="1">MARVEL</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#eab308" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #04</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#ffffff" font-family="'Impact', 'Arial Black', sans-serif" font-size="20" font-weight="900" text-anchor="middle" letter-spacing="0.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">CAPTAIN AMERICA</text>
  <text x="150" y="270" fill="#94a3b8" font-family="'Trebuchet MS', sans-serif" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="2">SENTINEL OF LIBERTY</text>
</svg>
