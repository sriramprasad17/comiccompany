<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172554"/> <!-- dark navy -->
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <filter id="crystalFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#wallGrad)"/>
  
  <!-- Retro Victorian Frame border -->
  <rect x="10" y="10" width="280" height="280" stroke="rgba(255,255,255,0.04)" stroke-width="2" fill="none"/>

  <!-- Victorian Smoking Pipe Silhouette -->
  <!-- x=190, y=140 -->
  <path d="M190 150 Q160 170 140 150 T120 120 L115 122 Q110 115 120 115" stroke="#78350f" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M190 145 H210 Q215 145 212 135 Z" fill="#451a03" opacity="0.4"/>

  <!-- Magnifying Glass -->
  <!-- Handle -->
  <rect x="75" y="160" width="8" height="50" rx="2" fill="#78350f" stroke="#451a03" stroke-width="1.5" transform="rotate(-45, 75, 160)"/>
  <!-- Rim -->
  <circle cx="125" cy="120" r="30" stroke="#cbd5e1" stroke-width="4.5" fill="rgba(255,255,255,0.05)"/>
  <circle cx="125" cy="120" r="28" stroke="#94a3b8" stroke-width="1"/>

  <!-- Blue Carbuncle Gem (Focused inside glass) -->
  <ellipse cx="130" cy="120" rx="25" ry="25" fill="url(#gemGlow)"/>
  <!-- Diamond geometry -->
  <g filter="url(#crystalFilter)">
    <polygon points="130,108 140,115 130,132 120,115" fill="#60a5fa" stroke="#3b82f6" stroke-width="1"/>
    <!-- Facets -->
    <line x1="130" y1="108" x2="130" y2="132" stroke="#93c5fd" stroke-width="0.8"/>
    <line x1="120" y1="115" x2="140" y2="115" stroke="#93c5fd" stroke-width="0.8"/>
  </g>

  <!-- Brand Tag -->
  <rect x="15" y="15" width="85" height="20" rx="3" fill="#eab308"/>
  <text x="57.5" y="29" fill="#000000" font-family="'Impact', 'Arial Black', sans-serif" font-size="10" font-weight="900" text-anchor="middle" letter-spacing="0.5">CRIME SCENE</text>
  
  <!-- Issue Tag -->
  <text x="285" y="28" fill="#60a5fa" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="end">ISSUE #02</text>

  <!-- Title Text -->
  <text x="150" y="250" fill="#f8fafc" font-family="'Impact', 'Arial Black', sans-serif" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="1" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">SHERLOCK HOLMES</text>
  <text x="150" y="272" fill="#60a5fa" font-family="'Trebuchet MS', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle" letter-spacing="2">THE BLUE CARBUNCLE</text>
</svg>
